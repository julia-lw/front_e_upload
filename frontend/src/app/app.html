<h3 class="text-xl font-bold mb-4 text-gray-700">Arquivos Salvos</h3>

<div class="overflow-hidden border border-gray-200 rounded-lg">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Miniatura</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nome</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tamanho</th>
        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Ações</th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
      @for (arquivo of arquivos; track arquivo.filename) {
        <tr class="hover:bg-gray-50 transition-colors">
          
          <td class="px-6 py-4 whitespace-nowrap">
            <div class="w-12 h-12 rounded-lg overflow-hidden border border-gray-200 bg-gray-100 flex items-center justify-center">
              <img 
                [src]="baseUrlImagens + arquivo.filename" 
                alt="Miniatura"
                class="w-full h-full object-cover"
                (error)="$event.target.src = 'assets/fallback-image.png'" /> 
                </div>
          </td>

          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
            {{ arquivo.filename }}
          </td>
          
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
            {{ (arquivo.size / 1024).toFixed(2) }} KB
          </td>
          
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
            <a 
              [href]="baseUrlImagens + arquivo.filename" 
              download 
              target="_blank"
              class="text-indigo-600 hover:text-indigo-900 font-semibold bg-indigo-50 px-3 py-1.5 rounded-md hover:bg-indigo-100 transition-colors inline-flex items-center">
              Download
            </a>

            <button 
              (click)="deletarArquivo(arquivo.filename)" 
              class="text-red-600 hover:text-red-900 font-semibold bg-red-50 px-3 py-1.5 rounded-md hover:bg-red-100 transition-colors">
              Excluir
            </button>
          </td>

        </tr>
      } @empty {
        <tr>
          <td colspan="4" class="px-6 py-8 text-center text-gray-500">
            Nenhum arquivo encontrado no servidor.
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
